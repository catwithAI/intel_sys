<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情报系统 · 实时聚类信号</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/static/assets/theme.css">
<style>
  body { overflow-x: hidden; }
  .hero-count { font-family: var(--mono); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div x-data="feed()" x-init="init()" x-cloak>

  <!-- ============ SHELL HEADER ============ -->
  <header class="shell-header">
    <div class="max-w-5xl mx-auto px-5 md:px-8 py-3.5 flex items-center justify-between gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <span class="brand-mark">情报系统</span>
        <span class="brand-sub hidden sm:inline">SIGNAL&nbsp;INTELLIGENCE&nbsp;RUNTIME</span>
      </div>
      <div class="flex items-center gap-5">
        <div class="flex items-center gap-2">
          <span class="status-dot" :class="!online && 'down'"></span>
          <span class="mono text-xs text-[var(--bone-dim)]" x-text="online ? 'ONLINE' : 'OFFLINE'"></span>
        </div>
        <nav class="flex items-center gap-3 sm:gap-5 overflow-x-auto scrollbar-thin">
          <a href="/static/index.html" class="nav-tab active">信号流</a>
          <a href="/static/filter.html" class="nav-tab">过滤机制</a>
          <a href="/static/sources.html" class="nav-tab">信源</a>
          <a href="/static/console.html" class="nav-tab">操作台</a>
        </nav>
      </div>
    </div>
    <div class="sweep-track"><div class="sweep-bar"></div></div>
  </header>

  <!-- ============ TOP METRICS STRIP ============ -->
  <div class="border-b hairline">
    <div class="max-w-5xl mx-auto px-5 md:px-8 py-5 grid grid-cols-2 md:grid-cols-4 gap-6">
      <div>
        <div class="eyebrow mb-1.5">记忆池事件</div>
        <div class="hero-count text-2xl text-[var(--bone)]" x-text="metrics.memory_events ?? '—'"></div>
      </div>
      <div>
        <div class="eyebrow mb-1.5">在线规则</div>
        <div class="hero-count text-2xl text-[var(--bone)]" x-text="metrics.active_rules ?? '—'"></div>
      </div>
      <div>
        <div class="eyebrow mb-1.5">接入信源</div>
        <div class="hero-count text-2xl text-[var(--bone)]" x-text="metrics.connected_sources ?? '—'"></div>
      </div>
      <div>
        <div class="eyebrow mb-1.5">高优先级</div>
        <div class="hero-count text-2xl" :class="metrics.high_priority > 0 ? 'text-[var(--alert-high)]' : 'text-[var(--bone)]'" x-text="metrics.high_priority ?? '—'"></div>
      </div>
    </div>
  </div>

  <!-- ============ MAIN: TICKER STACK ============ -->
  <main class="max-w-5xl mx-auto px-5 md:px-8 py-8">
    <div class="flex items-baseline justify-between mb-4">
      <div class="flex items-center gap-2.5">
        <h1 class="mono text-sm tracking-wide text-[var(--bone)]">最新聚类信号</h1>
        <span class="live-chip" x-show="mode === 'clustered'">● LIVE</span>
        <span class="mono text-[10px] tracking-wide text-[var(--bone-mute)] border border-[var(--line)] px-1.5 py-0.5" x-show="mode === 'signals'">未生成聚类 · 显示原始信号</span>
      </div>
      <span class="mono text-[11px] text-[var(--bone-mute)]" x-text="lastUpdated ? '更新于 ' + timeAgo(lastUpdated) : ''"></span>
    </div>

    <div x-show="!loading && clusters.length === 0" class="panel px-6 py-14 text-center">
      <div class="mono text-sm text-[var(--bone-mute)]">暂无信号 — 等待下一次采集周期</div>
    </div>

    <div class="panel">
      <template x-for="(item, idx) in clusters" :key="item.id">
        <div class="ticker-item px-4 md:px-5 py-4 flex gap-4 cursor-pointer"
             :class="[idx === 0 && item._fresh ? 'ticker-enter' : '', depthClass(idx)]"
             @click="item._open = !item._open">
          <div class="sev-bar flex-shrink-0" :class="'sev-' + item.severity"></div>

          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="eyebrow" x-text="item.category"></span>
                <span class="mono text-[10px] text-[var(--bone-mute)]" x-text="'· ' + item.signal_count + ' 信号来源'"></span>
              </div>
              <span class="mono text-[11px] text-[var(--bone-mute)] flex-shrink-0" x-text="timeAgo(item.created_at)"></span>
            </div>

            <div class="mt-1.5 text-[15px] leading-snug text-[var(--bone)]"
                 :class="idx === 0 && item._fresh && !item._typed ? 'type-cursor' : ''"
                 x-text="idx === 0 && item._fresh ? item._typedTitle : item.title"></div>

            <p class="mt-1.5 text-sm text-[var(--bone-dim)] leading-relaxed" x-show="item._open || idx < 3" x-text="item.summary"></p>

            <div class="mt-2.5 flex items-center gap-2 flex-wrap" x-show="item._open">
              <template x-for="src in item.sources" :key="src">
                <span class="mono text-[10px] text-[var(--bone-dim)] border border-[var(--line)] px-1.5 py-0.5" x-text="src"></span>
              </template>
              <span class="mono text-[10px] text-[var(--signal)] ml-1" x-text="'置信度 ' + Math.round(item.confidence * 100) + '%'"></span>
              <a x-show="item.url" :href="item.url" target="_blank" rel="noopener" @click.stop
                 class="mono text-[10px] text-[var(--bone-mute)] hover:text-[var(--signal)] ml-1 underline underline-offset-2">原文 →</a>
            </div>
          </div>
        </div>
      </template>
    </div>

    <div class="mt-3 flex justify-end">
      <span class="mono text-[10.5px] text-[var(--bone-mute)]" x-text="'下一次轮询 · ' + pollLabel"></span>
    </div>
  </main>

  <footer class="max-w-5xl mx-auto px-5 md:px-8 py-8 border-t hairline">
    <p class="mono text-[10.5px] text-[var(--bone-mute)]">Source → Event → Rule → AI → Alert</p>
  </footer>

</div>

<script>
function feed() {
  return {
    clusters: [],
    metrics: {},
    mode: 'clustered',
    online: true,
    loading: true,
    lastUpdated: null,
    pollLabel: '30s',
    _seen: new Set(),
    _poll: null,

    async init() {
      await this.fetchOverview(true);
      this._poll = setInterval(() => this.fetchOverview(false), 30000);
    },

    async fetchOverview(isFirst) {
      try {
        const res = await fetch('/dashboard-api/overview');
        const data = await res.json();
        this.online = true;
        this.mode = data.mode || 'clustered';
        this.metrics = data.metrics || {};
        this.lastUpdated = Date.now();

        const incoming = (data.clusters || []).map(c => ({ ...c, _open: false, _fresh: false, _typed: true }));

        if (isFirst) {
          this.clusters = incoming;
          incoming.forEach(c => this._seen.add(c.id));
        } else {
          const fresh = incoming.filter(c => !this._seen.has(c.id));
          fresh.forEach(c => this._seen.add(c.id));
          if (fresh.length) {
            const newest = fresh[0];
            newest._fresh = true;
            newest._typed = false;
            newest._typedTitle = '';
            this.clusters = [newest, ...fresh.slice(1), ...this.clusters].slice(0, 40);
            this.typeTitle(newest);
          }
        }
      } catch (e) {
        this.online = false;
        console.error('拉取信号流失败:', e);
      } finally {
        this.loading = false;
      }
    },

    typeTitle(item) {
      const full = item.title || '';
      let i = 0;
      const step = () => {
        item._typedTitle = full.slice(0, i);
        i++;
        if (i <= full.length) {
          requestAnimationFrame(() => setTimeout(step, 14));
        } else {
          item._typed = true;
        }
      };
      step();
    },

    depthClass(idx) {
      if (idx <= 1) return '';
      if (idx === 2) return 'depth-1';
      if (idx === 3) return 'depth-2';
      if (idx <= 6) return 'depth-3';
      if (idx <= 12) return 'depth-4';
      return 'depth-far';
    },

    timeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return mins + ' 分钟前';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + ' 小时前';
      const days = Math.floor(hours / 24);
      return days + ' 天前';
    },
  };
}
</script>
</body>
</html>
